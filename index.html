<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Mercado Livre</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .login-screen {
      background: white;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 400px;
      margin: 80px auto;
    }

    .login-screen h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .login-screen p {
      color: #666;
      margin-bottom: 30px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      text-align: left;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #c33;
    }

    .dashboard {
      display: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header h1 {
      color: #333;
      font-size: 24px;
    }

    .logout-btn {
      width: auto;
      padding: 10px 20px;
      background: #f44;
      font-size: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .metric-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    .metric-card h3 {
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .metric-card .value {
      color: #333;
      font-size: 32px;
      font-weight: bold;
    }

    .section {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .section h2 {
      color: #333;
      margin-bottom: 15px;
      font-size: 18px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-title {
      color: #333;
      font-weight: 500;
    }

    .item-detail {
      color: #999;
      font-size: 12px;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .status.pending {
      background: #fff3cd;
      color: #856404;
    }

    .status.paid {
      background: #d4edda;
      color: #155724;
    }

    .status.cancelled {
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Tela de Login -->
    <div id="login" class="login-screen">
      <h1>🏪 Painel ML</h1>
      <p>Acesse seu painel do Mercado Livre</p>
      <div id="error-msg"></div>
      <form onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="token">Access Token</label>
          <input 
            type="password" 
            id="token" 
            placeholder="Cole seu token aqui"
            required
          >
        </div>
        <button type="submit">Entrar</button>
      </form>
      <p style="margin-top: 20px; font-size: 12px; color: #999;">
        Token não tem? <a href="https://developers.mercadolivre.com.br" target="_blank" style="color: #667eea;">Gere aqui</a>
      </p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
      <div class="header">
        <h1>🏪 Seu Painel</h1>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>

      <div id="metrics" class="metrics">
        <div class="metric-card">
          <h3>Vendas (7 dias)</h3>
          <div class="value" id="metric-sales">-</div>
        </div>
        <div class="metric-card">
          <h3>Faturamento</h3>
          <div class="value" id="metric-revenue">-</div>
        </div>
        <div class="metric-card">
          <h3>Reputação</h3>
          <div class="value" id="metric-reputation">-</div>
        </div>
        <div class="metric-card">
          <h3>Pedidos Ativos</h3>
          <div class="value" id="metric-orders">-</div>
        </div>
      </div>

      <div class="section">
        <h2>📦 Últimos Pedidos</h2>
        <div id="orders-list" class="loading">
          <div class="spinner"></div>
          Carregando pedidos...
        </div>
      </div>

      <div class="section">
        <h2>💬 Mensagens Recentes</h2>
        <div id="messages-list" class="loading">
          <div class="spinner"></div>
          Carregando mensagens...
        </div>
      </div>

      <div class="section">
        <h2>⭐ Reputação Detalhada</h2>
        <div id="reputation-list" class="loading">
          <div class="spinner"></div>
          Carregando reputação...
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/server'; // URL do seu backend na Vercel
    let token = null;

    // Carregar token do localStorage
    window.addEventListener('load', () => {
      token = localStorage.getItem('ml_token');
      if (token) {
        showDashboard();
        loadData();
      }
    });

    function handleLogin(event) {
      event.preventDefault();
      token = document.getElementById('token').value.trim();
      
      if (!token) {
        showError('Token não pode estar vazio');
        return;
      }

      localStorage.setItem('ml_token', token);
      showDashboard();
      loadData();
    }

    function logout() {
      localStorage.removeItem('ml_token');
      token = null;
      showLogin();
      document.getElementById('error-msg').innerHTML = '';
    }

    function showLogin() {
      document.getElementById('login').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('login').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    }

    function showError(msg) {
      document.getElementById('error-msg').innerHTML = `<div class="error">${msg}</div>`;
    }

    async function apiCall(endpoint, method = 'GET', body = null) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            endpoint,
            token,
            method,
            body
          })
        });

        const data = await response.json();

        if (response.status !== 200 && data.error) {
          throw new Error(data.error);
        }

        return data;
      } catch (error) {
        console.error('Erro na API:', error);
        showError(`Erro: ${error.message}`);
        return null;
      }
    }

    async function loadData() {
      // Carrega usuário
      const user = await apiCall('/users/me');
      if (!user || !user.id) {
        showError('Token inválido ou expirado');
        showLogin();
        return;
      }

      // Carrega pedidos
      loadOrders(user.id);

      // Carrega mensagens
      loadMessages();

      // Carrega reputação
      loadReputation(user.id);
    }

    async function loadOrders(userId) {
      const orders = await apiCall(`/orders/search?seller=${userId}&sort=date_desc&limit=10`);
      
      if (!orders || !orders.results) {
        document.getElementById('orders-list').innerHTML = '<div class="item">Nenhum pedido encontrado</div>';
        return;
      }

      const html = orders.results.slice(0, 10).map(order => {
        const status = order.status === 'paid' ? 'Pago' : 'Pendente';
        const statusClass = order.status === 'paid' ? 'paid' : 'pending';
        return `
          <div class="item">
            <div>
              <div class="item-title">#${order.id}</div>
              <div class="item-detail">${order.date_created.slice(0, 10)}</div>
            </div>
            <span class="status ${statusClass}">${status}</span>
          </div>
        `;
      }).join('');

      document.getElementById('orders-list').innerHTML = html;
      document.getElementById('metric-orders').textContent = orders.paging?.total || 0;
    }

    async function loadMessages() {
      const messages = await apiCall('/messages/conversations');
      
      if (!messages || !messages.conversations) {
        document.getElementById('messages-list').innerHTML = '<div class="item">Sem mensagens</div>';
        return;
      }

      const html = messages.conversations.slice(0, 5).map(conv => {
        return `
          <div class="item">
            <div>
              <div class="item-title">${conv.buyer?.nickname || 'Comprador'}</div>
              <div class="item-detail">${conv.last_message?.text?.substring(0, 50) || 'Sem mensagem'}...</div>
            </div>
            <span style="color: #667eea; font-weight: bold;">${conv.unread_count || 0} msgs</span>
          </div>
        `;
      }).join('');

      document.getElementById('messages-list').innerHTML = html;
    }

    async function loadReputation(userId) {
      const reputation = await apiCall(`/users/${userId}/reputation`);
      
      if (!reputation) {
        document.getElementById('reputation-list').innerHTML = '<div class="item">Sem dados de reputação</div>';
        return;
      }

      const seller = reputation.seller;
      const html = `
        <div class="item">
          <div>
            <div class="item-title">Rating Positivo</div>
            <div class="item-detail">${seller.positive_rating || 0}%</div>
          </div>
        </div>
        <div class="item">
          <div>
            <div class="item-title">Vendas Completas</div>
            <div class="item-detail">${seller.completed_transactions || 0}</div>
          </div>
        </div>
        <div class="item">
          <div>
            <div class="item-title">Canceladas</div>
            <div class="item-detail">${seller.canceled_transactions || 0}</div>
          </div>
        </div>
      `;

      document.getElementById('reputation-list').innerHTML = html;
      document.getElementById('metric-reputation').textContent = (seller.positive_rating || 0) + '%';
    }
  </script>
</body>
</html>
